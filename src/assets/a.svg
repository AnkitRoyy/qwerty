<svg viewBox="0 0 500 350" class="man-svg">

  <!-- DESK -->
  <rect x="250" y="200" width="180" height="100" rx="12" class="desk"/>

  <!-- SCREEN -->
  <rect x="300" y="80" width="120" height="90" rx="12" class="screen"/>

  <!-- KEYBOARD -->
  <rect x="270" y="170" width="100" height="20" rx="6" class="keyboard"/>

  <!-- CHAIR -->
  <rect x="120" y="200" width="80" height="12" rx="6" class="chair-seat"/>
  <rect x="140" y="210" width="10" height="50" class="chair-leg"/>

  <!-- BODY -->
  <path class="body"
    d="M180 140
       Q200 110 240 120
       L260 170
       L240 210
       L180 200
       Z" />

  <!-- ARM -->
  <g class="arm">
    <rect x="230" y="150" width="70" height="14" rx="7"/>
  </g>

  <!-- HEAD -->
  <g class="head">
    <circle cx="200" cy="100" r="18"/>
  </g>

</svg>